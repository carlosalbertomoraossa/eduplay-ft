name: edplay_ft
description: EduPlay — Plataforma educativa gamificada para niños colombianos

# Spec: /specs/frontend/flutter-arch.md

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  equatable: ^2.0.5

  # Navegación
  go_router: ^14.0.0

  # Red
  dio: ^5.4.3

  # Persistencia local (offline-first)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.0

  # Animaciones
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # Imágenes
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.1

  # Utils
  json_annotation: ^4.9.0
  intl: ^0.19.0

  # Juego 2D
  flame: ^1.18.0
  flame_bloc: ^1.4.0
  flame_audio: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

  # Code generation
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  injectable_generator: ^2.4.2
  drift_dev: ^2.18.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/images/games/g4/
    - assets/audio/games/g4/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
